<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGN Discord Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #131314;
      --surface-low: rgba(28, 27, 28, 0.72);
      --surface: rgba(32, 31, 32, 0.82);
      --surface-high: rgba(42, 42, 43, 0.88);
      --surface-strong: rgba(19, 19, 20, 0.72);
      --text: #e5e2e3;
      --muted: rgba(229, 226, 227, 0.62);
      --outline: rgba(76, 70, 59, 0.35);
      --primary: #dcc48e;
      --primary-dim: #b39d6a;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(19, 19, 20, 0.6) 0%, rgba(19, 19, 20, 0.5) 28%, rgba(19, 19, 20, 0.88) 100%),
        linear-gradient(90deg, rgba(19, 19, 20, 0.8) 0%, rgba(19, 19, 20, 0.35) 42%, rgba(19, 19, 20, 0.72) 100%),
        url("ChatGPT Image Apr 8, 2026, 08_02_45 AM.png") center 18% / cover no-repeat;
      z-index: -3;
      transform: scale(1.02);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(220, 196, 142, 0.1), transparent 32%),
        linear-gradient(180deg, rgba(19, 19, 20, 0) 58%, rgba(19, 19, 20, 0.92) 100%);
      z-index: -2;
      pointer-events: none;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px;
      position: relative;
    }

    .hero {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
      gap: 48px;
      align-items: center;
    }

    .hero-copy {
      padding: 0;
      max-width: 620px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 7vw, 6.2rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      max-width: 10ch;
      text-transform: uppercase;
    }

    .hero-panel {
      position: relative;
      padding: 34px;
      background: linear-gradient(180deg, rgba(24, 24, 25, 0.82), rgba(19, 19, 20, 0.92));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      min-width: 0;
    }

    .hero-panel::before,
    .hero-panel::after {
      content: "";
      position: absolute;
      background: rgba(220, 196, 142, 0.16);
    }

    .hero-panel::before {
      top: -14px;
      left: -14px;
      width: 72px;
      height: 1px;
    }

    .hero-panel::after {
      top: -14px;
      left: -14px;
      width: 1px;
      height: 72px;
    }

    .panel-topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .display-stage {
      min-height: 176px;
      display: grid;
      position: relative;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
      height: 100%;
    }

    .display-stage > .timer,
    .display-stage > .time-view {
      grid-area: 1 / 1;
    }

    .time-box {
      min-width: 0;
      padding: 26px 12px 24px;
      background: var(--surface-low);
      text-align: center;
    }

    .time-value {
      display: block;
      color: var(--primary);
      font-size: clamp(2.9rem, 5vw, 4.5rem);
      line-height: 0.9;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(220, 196, 142, 0.28);
    }

    .time-label {
      display: block;
      margin-top: 18px;
      color: rgba(229, 226, 227, 0.44);
      text-transform: uppercase;
      letter-spacing: 0.32em;
      font-size: 0.62rem;
    }

    .time-view {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100%;
      height: 100%;
      padding: 26px 24px 24px;
      background: var(--surface-low);
      text-align: center;
    }

    .time-view[hidden],
    .timer[hidden] {
      display: none;
    }

    .time-line {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;
      white-space: nowrap;
      color: var(--primary);
      font-size: clamp(2.1rem, 3.6vw, 3.12rem);
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(220, 196, 142, 0.28);
    }

    .time-zone {
      color: rgba(229, 226, 227, 0.6);
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 500;
      text-shadow: none;
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      margin-top: 28px;
    }

    button {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .primary-button,
    .secondary-button {
      padding: 14px 18px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease;
    }

    .edit-button {
      padding: 10px 14px;
      font-size: 0.64rem;
      letter-spacing: 0.16em;
      align-self: flex-end;
    }

    .primary-button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dim));
      color: #221b0a;
      font-weight: 700;
    }

    .secondary-button {
      color: var(--primary);
      background: rgba(220, 196, 142, 0.06);
      box-shadow: inset 0 0 0 1px rgba(220, 196, 142, 0.22);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-2px);
    }

    .editor-card {
      display: grid;
      gap: 18px;
      padding: 20px;
      width: 100%;
      background: var(--surface-high);
      box-shadow: inset 0 0 0 1px rgba(76, 70, 59, 0.2);
    }

    .editor-card[hidden] {
      display: none;
    }

    input[type="datetime-local"] {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(220, 196, 142, 0.24);
      background: transparent;
      color: var(--text);
      padding: 14px 0 12px;
      font: inherit;
      outline: none;
    }

    input[type="datetime-local"]:focus {
      border-bottom-color: var(--primary);
    }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .field-label {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.58rem;
      margin-bottom: 2px;
    }

    input[type="password"] {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(220, 196, 142, 0.24);
      background: transparent;
      color: var(--text);
      padding: 14px 0 12px;
      font: inherit;
      outline: none;
    }

    input[type="password"]:focus {
      border-bottom-color: var(--primary);
    }

    .editor-status {
      margin: 0;
      font-size: 0.72rem;
      min-height: 1.2em;
    }

    .editor-status.error { color: #e57373; }
    .editor-status.success { color: #81c784; }
    .editor-status.loading { color: var(--muted); }

    @media (max-width: 980px) {
      body::before {
        background:
          linear-gradient(180deg, rgba(19, 19, 20, 0.68) 0%, rgba(19, 19, 20, 0.44) 18%, rgba(19, 19, 20, 0.92) 100%),
          linear-gradient(90deg, rgba(19, 19, 20, 0.74) 0%, rgba(19, 19, 20, 0.18) 50%, rgba(19, 19, 20, 0.68) 100%),
          url("ChatGPT Image Apr 8, 2026, 08_02_45 AM.png") 58% 12% / cover no-repeat;
      }

      .shell {
        padding-left: 20px;
        padding-right: 20px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .hero-copy {
        max-width: none;
      }

      h1 {
        max-width: 12ch;
      }

      .hero-panel {
        padding: 24px 20px;
      }

      .display-stage {
        min-height: 396px;
      }

      .timer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .time-box {
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        align-content: center;
      }

      .time-label {
        margin-top: 12px;
      }

    }

    @media (max-width: 640px) {
      body::before {
        background:
          linear-gradient(180deg, rgba(19, 19, 20, 0.68) 0%, rgba(19, 19, 20, 0.44) 18%, rgba(19, 19, 20, 0.92) 100%),
          linear-gradient(90deg, rgba(19, 19, 20, 0.74) 0%, rgba(19, 19, 20, 0.18) 50%, rgba(19, 19, 20, 0.68) 100%),
          url("ChatGPT Image Apr 8, 2026, 08_02_45 AM.png") center 10% / cover no-repeat;
      }

      .shell {
        padding: 20px 16px;
      }

      .hero {
        padding-top: 8px;
      }

      h1 {
        font-size: clamp(2.8rem, 14vw, 4.25rem);
        max-width: none;
      }

      .time-box {
        padding: 18px 10px;
      }

      .time-value {
        font-size: clamp(2.8rem, 14vw, 4rem);
      }

      .time-line {
        gap: 6px;
        font-size: clamp(1.44rem, 7.2vw, 2.1rem);
        line-height: 1;
      }

      .time-zone {
        width: auto;
        font-size: 0.56rem;
      }

      .time-label {
        font-size: 0.58rem;
        letter-spacing: 0.28em;
      }

      .editor-card {
        padding: 16px;
      }

      .editor-actions {
        flex-direction: column-reverse;
        align-items: stretch;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
      }

      .edit-button {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="hero">
      <section class="hero-copy" aria-label="Page introduction">
        <h1>WHAT TIME<br>TO BE ON<br>CGN DISCORD</h1>
      </section>

      <section class="hero-panel" aria-label="Countdown module">
        <div class="panel-topbar">
          <button class="secondary-button" id="viewToggleButton" type="button">Time</button>
        </div>

        <div class="display-stage">
          <div class="timer" aria-label="Countdown timer">
            <div class="time-box">
              <span class="time-value" id="days">00</span>
              <span class="time-label">Days</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="hours">00</span>
              <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="minutes">00</span>
              <span class="time-label">Minutes</span>
            </div>
            <div class="time-box">
              <span class="time-value" id="seconds">00</span>
              <span class="time-label">Seconds</span>
            </div>
          </div>

          <div class="time-view" id="timeView" hidden aria-label="Meeting date and time in CEST">
            <div class="time-line">
              <span id="cestDate">00/00</span>
              <span>-</span>
              <span id="cestTime">00:00</span>
              <span class="time-zone" id="cestZone">CEST</span>
            </div>
          </div>
        </div>

        <div class="editor-wrap">
          <button class="primary-button edit-button" id="editButton" type="button">Edit Date</button>

          <form class="editor-card" id="editor" hidden>
            <label class="field-label" for="meetingTime">Date &amp; Time (CEST)</label>
            <input id="meetingTime" name="meetingTime" type="datetime-local" required>
            <p class="editor-status" id="editorStatus"></p>
            <div class="editor-actions">
              <button class="secondary-button" id="cancelEditButton" type="button">Cancel</button>
              <button class="primary-button" type="submit" id="saveButton">Save</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script>
    /* ── FIREBASE CONFIG ──
       Replace DB_URL with your Firebase Realtime Database URL.
       See setup instructions in the README. */
    const DB_URL = "https://cgntimer-52aba-default-rtdb.europe-west1.firebasedatabase.app";
    const FALLBACK_TARGET_ISO = "2026-04-09T18:00:00.000Z";

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const timerEl = document.querySelector(".timer");
    const timeViewEl = document.getElementById("timeView");
    const viewToggleButton = document.getElementById("viewToggleButton");
    const cestDateEl = document.getElementById("cestDate");
    const cestTimeEl = document.getElementById("cestTime");
    const cestZoneEl = document.getElementById("cestZone");
    const editButton = document.getElementById("editButton");
    const editorForm = document.getElementById("editor");
    const cancelEditButton = document.getElementById("cancelEditButton");
    const meetingTimeInput = document.getElementById("meetingTime");
    const statusEl = document.getElementById("editorStatus");
    const saveButton = document.getElementById("saveButton");

    let showingTimeView = false;
    let targetDate = new Date(FALLBACK_TARGET_ISO);

    /* ---------- Timezone helpers ---------- */

    function toCestInputValue(date) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Europe/Berlin",
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).formatToParts(date);
      const get = (t) => parts.find((p) => p.type === t)?.value ?? "00";
      return `${get("year")}-${get("month")}-${get("day")}T${get("hour")}:${get("minute")}`;
    }

    function cestInputToUTC(localStr) {
      const guess = new Date(localStr + ":00Z");
      const berlinStr = guess.toLocaleString("sv-SE", { timeZone: "Europe/Berlin" });
      const berlinAsUTC = new Date(berlinStr.replace(" ", "T") + "Z");
      const offsetMs = berlinAsUTC.getTime() - guess.getTime();
      return new Date(guess.getTime() - offsetMs);
    }

    /* ---------- Firebase REST API ---------- */

    async function fetchTarget() {
      try {
        const res = await fetch(`${DB_URL}/meeting.json`);
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        if (data && data.target) {
          const d = new Date(data.target);
          if (!Number.isNaN(d.getTime())) targetDate = d;
        }
      } catch {
        /* use fallback */
      }
      meetingTimeInput.value = toCestInputValue(targetDate);
      renderCountdown();
    }

    async function saveTarget(date) {
      setStatus("Saving…", "loading");
      saveButton.disabled = true;
      try {
        const res = await fetch(`${DB_URL}/meeting.json`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ target: date.toISOString() })
        });
        if (!res.ok) throw new Error("Failed to save");
        setStatus("Saved!", "success");
        setTimeout(() => { setStatus(""); closeEditor(); }, 1200);
      } catch (e) {
        setStatus(e.message, "error");
      } finally {
        saveButton.disabled = false;
      }
    }

    /* ---------- UI helpers ---------- */

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "editor-status" + (cls ? " " + cls : "");
    }

    function openEditor() {
      meetingTimeInput.value = toCestInputValue(targetDate);
      setStatus("");
      editorForm.hidden = false;
      editButton.hidden = true;
      meetingTimeInput.focus();
    }

    function closeEditor() {
      editorForm.hidden = true;
      editButton.hidden = false;
    }

    function formatCestParts(date) {
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/Berlin",
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        timeZoneName: "short",
        hour12: false
      }).formatToParts(date);

      const readPart = (type) => parts.find((part) => part.type === type)?.value ?? "";

      return {
        date: `${readPart("day")}/${readPart("month")}`,
        time: `${readPart("hour")}:${readPart("minute")}`,
        zone: readPart("timeZoneName") || "CEST"
      };
    }

    function renderViewMode() {
      timerEl.hidden = showingTimeView;
      timeViewEl.hidden = !showingTimeView;
      viewToggleButton.textContent = showingTimeView ? "Countdown" : "Time";
    }

    function renderCountdown() {
      const now = new Date();
      const diff = targetDate.getTime() - now.getTime();
      const cestParts = formatCestParts(targetDate);

      cestDateEl.textContent = cestParts.date;
      cestTimeEl.textContent = cestParts.time;
      cestZoneEl.textContent = cestParts.zone;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
      } else {
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        daysEl.textContent = String(days).padStart(2, "0");
        hoursEl.textContent = String(hours).padStart(2, "0");
        minutesEl.textContent = String(minutes).padStart(2, "0");
        secondsEl.textContent = String(seconds).padStart(2, "0");
      }
    }

    /* ---------- Events ---------- */

    editorForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const utcDate = cestInputToUTC(meetingTimeInput.value);
      if (Number.isNaN(utcDate.getTime())) return;
      targetDate = utcDate;
      renderCountdown();
      saveTarget(targetDate);
    });

    viewToggleButton.addEventListener("click", () => {
      showingTimeView = !showingTimeView;
      renderViewMode();
    });

    editButton.addEventListener("click", openEditor);
    cancelEditButton.addEventListener("click", closeEditor);

    /* ---------- Init ---------- */

    renderViewMode();
    renderCountdown();
    fetchTarget();
    setInterval(renderCountdown, 1000);
  </script>
</body>
</html>
